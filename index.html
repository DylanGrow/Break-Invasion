<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Breakout: Overdrive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #050510;
  color: #0ff;
  font-family: monospace;
  overflow: hidden;
}
canvas {
  display: block;
  margin: auto;
  background: radial-gradient(#0a0a1f, #02020a);
  box-shadow: 0 0 40px #0ff;
}
#ui {
  position: absolute;
  top: 10px;
  left: 20px;
  color: #0ff;
}
</style>
</head>
<body>

<div id="ui"></div>
<canvas id="game" width="900" height="600"></canvas>

<script>
// ================== SETUP ==================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");

let mouseX = canvas.width/2;
let keys = {};
let score = 0;
let combo = 1;
let lives = 3;
let wave = 1;

// ================== AUDIO ==================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration=0.1, type="sawtooth") {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// ================== PADDLE ==================
const paddle = {
  x: canvas.width/2 - 60,
  y: canvas.height - 40,
  w: 120,
  h: 12,
  speed: 8,
  shield: false,
  laser: null,
  cooldown: 0
};

// ================== BALL ==================
let balls = [];

function spawnBall(x, y) {
  balls.push({
    x, y,
    vx: (Math.random()*4-2),
    vy: -5,
    r: 6
  });
}

// ================== BRICKS ==================
let bricks = [];
function generateWave() {
  bricks = [];
  for(let r=0;r<5+wave;r++){
    for(let c=0;c<10;c++){
      let type = Math.random();
      bricks.push({
        x: c*85+20,
        y: r*30+40,
        w: 70,
        h: 20,
        hp: type<0.7 ? 1 : 999,
        shooter: type>0.7,
        t: 0
      });
    }
  }
}

// ================== PROJECTILES ==================
let enemyShots = [];
let playerShots = [];

// ================== POWERUPS ==================
let powerups = [];
function spawnPower(x,y){
  const types = ["multi","shield","laser_auto","laser_tap","laser_charge"];
  powerups.push({x,y,type:types[Math.floor(Math.random()*types.length)],vy:2});
}

// ================== INPUT ==================
document.addEventListener("mousemove", e=>{
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// ================== UPDATE ==================
function update() {

  paddle.x += (mouseX - (paddle.x+paddle.w/2)) * 0.2;

  if(keys["ArrowLeft"]) paddle.x -= paddle.speed;
  if(keys["ArrowRight"]) paddle.x += paddle.speed;

  paddle.x = Math.max(0, Math.min(canvas.width-paddle.w, paddle.x));

  // Balls
  balls.forEach(ball=>{
    ball.x += ball.vx;
    ball.y += ball.vy;

    if(ball.x<0||ball.x>canvas.width) ball.vx*=-1;
    if(ball.y<0) ball.vy*=-1;

    // paddle collision
    if(ball.y > paddle.y &&
       ball.x > paddle.x &&
       ball.x < paddle.x+paddle.w) {
        ball.vy = -Math.abs(ball.vy);
        combo += 0.2;
        beep(600);
    }

    // bottom
    if(ball.y > canvas.height){
      lives--;
      beep(100,0.3);
      spawnBall(canvas.width/2, canvas.height-60);
    }
  });

  // Bricks
  bricks.forEach(b=>{
    balls.forEach(ball=>{
      if(ball.x > b.x && ball.x < b.x+b.w &&
         ball.y > b.y && ball.y < b.y+b.h) {
           if(b.hp<999){
             b.hp--;
             score += 10 * combo;
             combo += 0.5;
             beep(800);
             if(Math.random()<0.2) spawnPower(b.x,b.y);
           }
           ball.vy *= -1;
      }
    });

    // Shooter behavior
    b.t++;
    if(b.shooter && b.t%120===0){
      enemyShots.push({x:b.x+35,y:b.y+20,vy:3});
    }
  });

  // Enemy shots
  enemyShots.forEach(s=>{
    s.y += s.vy;
    if(s.y > paddle.y &&
       s.x > paddle.x &&
       s.x < paddle.x+paddle.w){
         if(paddle.shield){
           paddle.shield=false;
         } else {
           lives--;
         }
         beep(150);
    }
  });

  // Powerups
  powerups.forEach(p=>{
    p.y += p.vy;
    if(p.y > paddle.y &&
       p.x > paddle.x &&
       p.x < paddle.x+paddle.w){
         applyPower(p.type);
         beep(1000);
    }
  });

  // Next wave
  if(bricks.every(b=>b.hp<=0||b.hp===999)){
    wave++;
    generateWave();
  }
}

// ================== POWER APPLY ==================
function applyPower(type){
  if(type==="multi"){
    spawnBall(paddle.x+50,paddle.y);
    spawnBall(paddle.x+70,paddle.y);
  }
  if(type==="shield"){
    paddle.shield = true;
  }
  if(type.startsWith("laser")){
    paddle.laser = type;
  }
}

// ================== DRAW ==================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Paddle
  ctx.fillStyle = paddle.shield ? "#0f0" : "#0ff";
  ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

  // Balls
  balls.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fillStyle="#f0f";
    ctx.fill();
  });

  // Bricks
  bricks.forEach(b=>{
    ctx.fillStyle = b.hp===999 ? "#555" : "#f0f";
    ctx.fillRect(b.x,b.y,b.w,b.h);
  });

  // Enemy shots
  ctx.fillStyle="#f00";
  enemyShots.forEach(s=>ctx.fillRect(s.x,s.y,4,10));

  // Powerups
  ctx.fillStyle="#ff0";
  powerups.forEach(p=>ctx.fillRect(p.x,p.y,10,10));

  ui.innerHTML = `Score: ${Math.floor(score)} | Combo: ${combo.toFixed(1)} | Lives: ${lives} | Wave: ${wave}`;
}

// ================== LOOP ==================
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ================== START ==================
spawnBall(canvas.width/2, canvas.height-60);
generateWave();
loop();

</script>
</body>
</html>
